<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>PAYMENT</title>
	<!-------------CSS FILE-------------> 
	<link rel="stylesheet" type="text/css" href="">
	<!-------------IMPORT FILE-------------> 
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">	
	<link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">	
	<link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet">
	<!-------------google font-------------> 
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<!-------------Swiper CSS-------------> 
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body {
			background-image: url('images/Wallpaper.png'); 
			background-size: cover; /* Ensures the image covers the entire page */
			background-position: center center; /* Centers the background image */
			background-repeat: no-repeat; /* Prevents the image from repeating */
			background-attachment: fixed; /* Makes the background image fixed */
			margin: 0;
			font-family: 'Open Sans', sans-serif;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		/* Sidebar styling */
		.sidebar {
			height: 100%;
			width: 0;
			position: fixed;
			top: 0;
			left: 0;
			background-color: #003366;
			overflow-x: hidden;
			transition: 0.5s;
			padding-top: 60px;
			display: flex;
			flex-direction: column; 
			justify-content: center; 
			align-items: center; 
			font-family: 'ov cotin Regular', serif;
		}

		.sidebar a {
			padding: 8px 16px;
			text-decoration: none;
			font-size: 25px;
			color: #ffffff;
			display: block;
			transition: 0.3s;
			text-align: center; 
		}

		.sidebar a:hover {
			color: #a7a7a7;
		}

		.container {
			display: inline-block;
			cursor: pointer;
			position: fixed;
			top: 20px;
			left: 20px;
			z-index: 2;
		}

		.bar1, .bar2, .bar3 {
			width: 35px;
			height: 5px;
			background-color: #003366;
			margin: 6px 0;
			transition: 0.4s;
		}

		.change .bar1 {
			transform: translate(0, 11px) rotate(-45deg);
			background-color: #ffffff;
		}

		.change .bar2 {
			opacity: 0;
			background-color: #ffffff;
		}

		.change .bar3 {
			transform: translate(0, -11px) rotate(45deg);
			background-color: #ffffff;
		}

		#main {
			flex: 1;
			padding: 30px 20px;
		}

		/* Logo styling */
		.logo-container {
			position: fixed;
			top: 20px;
			right: 20px;
			z-index: 3;
		}

		.logo-container img {
			width: 100px; 
			height: auto;
		}

		.payment-table tr:first-child th, 
		.payment-table tr:first-child td {
			background-color: #003366; 
			color: white; 
		}

		/* Payment section */
		.payment-section {
			background-color: #fff;
			padding: 50px;
			border-radius: 8px;
			box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
			max-width: 900px;
			margin: 20px auto;
		}

		.payment-section h2 {
			color: #003366;
			font-size: 32px;
			text-align: center;
			margin-bottom: 30px;
			font-weight: 600;
			text-transform: uppercase;
		}

		.payment-table {
			width: 100%;
			border-collapse: collapse;
			margin: 20px 0;
		}

		.payment-table th, .payment-table td {
			text-align: left;
			padding: 12px 15px;
			border-bottom: 1px solid #ddd;
		}

		.payment-table th {
			color: #003366;
			font-weight: bold;
		}

		.payment-table td {
			color: #333;
		}

		.payment-table .total-row {
			font-weight: bold;
			color: #003366;
		}

		.payment-buttons {
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-top: 30px;
		}

		.payment-buttons button {
			padding: 12px 25px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		.payment-buttons .pay-btn {
			background-color: #003366;
			color: white;
		}

		.payment-buttons .pay-btn:hover {
			background-color: #002244;
		}

		.payment-buttons .back-btn {
			background-color: #ddd;
			color: #333;
		}

		.payment-buttons .back-btn:hover {
			background-color: #ccc;
		}

		/* Payment Method Section */
		.payment-method {
			margin-top: 30px;
		}

		.payment-method label {
			font-weight: 600;
			color: #003366;
			display: inline-block;
			margin-bottom: 10px;
		}

		.payment-method > label {
			font-weight: 600;
			color: #003366;
			display: inline-block;
			margin-bottom: 10px;
			font-size: 24px; 
		}

		.payment-method input[type="radio"] {
			margin-right: 10px;
		}

		.payment-method div {
			margin-bottom: 20px;
		}

		.payment-method .online-banking select,
		.payment-method .credit-card input {
			width: 100%;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 4px;
			margin-bottom: 10px;
		}
	</style>
</head>
<body>

<!-- Logo at the top right -->
<div class="logo-container">
  <img src="images/logo.png" alt="Logo">
</div>

<!--side bar icon -->
<div class="container" onclick="toggleNav(this)">
  <div class="bar1"></div>
  <div class="bar2"></div>
  <div class="bar3"></div>
</div>

<!-- Sidebar -->
<div id="mySidebar" class="sidebar">
  <a href="home.html">Home</a>
  <a href="about.html">About</a>
</div>

<!-- Main content -->
<div id="main">
	<div class="payment-section">
		<h2>Payment Summary</h2>

		<!-- Reservation Dates Section -->
		<div style="margin-bottom: 30px; text-align: center;">
			<p><strong>Reservation Dates: </strong> 13/08/2025 to 15/08/2025</p>
			<p><strong>Event Type: </strong> Wedding</p>
		</div>

		<!-- Payment Table -->
		<table class="payment-table">
			<tr>
				<th>Description</th>
				<th>Quantity</th>
				<th>Unit Price</th>
				<th>Total Price</th>
			</tr>
			<tr>
				<td>Berseri Hall (Hall 2)</td>
				<td>3 Days</td>
				<td>RM2000</td>
				<td>RM6000</td>
			</tr>
			<tr>
				<td>Speaker</td>
				<td>1 Unit</td>
				<td>RM100</td>
				<td>RM100</td>
			</tr>
			<tr>
				<td>Microphone</td>
				<td>4 Units</td>
				<td>RM50</td>
				<td>RM200</td>
			</tr>
			<tr class="total-row">
				<td colspan="3">Total</td>
				<td>RM6300</td>
			</tr>
		</table>

		<!-- Payment Method Section -->
		<div class="payment-method">
			<label>Payment Method:</label>
			<div>
				<input type="radio" id="online-banking" name="payment-method" value="online-banking">
				<label for="online-banking">Online Banking</label>
				<div class="online-banking">
					<select id="bank-select" required>
						<option value="" disabled selected>Select Your Bank</option>
						<option value="bank-islam">Bank Islam</option>
						<option value="maybank">Maybank</option>
						<option value="cimb">CIMB</option>
						<option value="rhb">RHB Bank</option>
						<option value="hong-leong">Hong Leong Bank</option>
					</select>
				</div>
			</div>

			<div>
				<input type="radio" id="credit-card" name="payment-method" value="credit-card">
				<label for="credit-card">Credit Card</label>
				<div class="credit-card">
					<input type="text" id="card-number" placeholder="Card Number (16 digits)" pattern="\d{16}">
					<div style="display: flex; gap: 15px;">
						<input type="text" id="expiry-date" placeholder="Expiry Date (MM/YY)" pattern="(0[1-9]|1[0-2])\/\d{2}">
						<input type="text" id="cvv" placeholder="CVV (3 digits)" pattern="\d{3}">
					</div>
					<input type="text" id="name-on-card" placeholder="Name On Card">
				</div>
			</div>
		</div>

		<!-- Payment Buttons -->
		<div class="payment-buttons">
			<button class="back-btn" onclick="window.location.href='info.html'">BACK</button>
			<button class="pay-btn" id="pay-btn">PAY NOW</button>
		</div>

	</div>
</div>

<script>
// Handle Pay Now button click
document.getElementById("pay-btn").addEventListener("click", function(event) {
    // Get references to payment method options
    const onlineBanking = document.getElementById("online-banking");
    const creditCard = document.getElementById("credit-card");

    // Get references to the form fields
    const bankSelect = document.getElementById("bank-select");
    const cardNumber = document.getElementById("card-number");
    const expiryDate = document.getElementById("expiry-date");
    const cvv = document.getElementById("cvv");
    const nameOnCard = document.getElementById("name-on-card");

    // Check if no payment method is selected
    if (!onlineBanking.checked && !creditCard.checked) {
        alert("Please select a payment method.");
        event.preventDefault(); // Prevent form submission/redirect
        return;
    }

    // If Online Banking is selected, check if a bank is selected
    if (onlineBanking.checked && !bankSelect.value) {
        alert("Please select a bank for online banking.");
        event.preventDefault(); // Prevent form submission/redirect
        return;
    }

    // If Credit Card is selected, check if all credit card fields are filled
    if (creditCard.checked) {
        if (!cardNumber.value || !expiryDate.value || !cvv.value || !nameOnCard.value) {
            alert("Please fill out all credit card details.");
            event.preventDefault(); // Prevent form submission/redirect
            return;
        }
    }

    // If all checks pass, proceed to the next page (remove the redirect code below if you don't want to redirect)
    alert("Payment has been processed successfully!");
    window.location.href = "receipt.html";  
});
</script>
<script>
	// Toggle the sidebar open/close
	function toggleNav(icon) {
		icon.classList.toggle("change");
		const sidebar = document.getElementById("mySidebar");
	
		if (sidebar.style.width === "250px") {
			closeNav();
		} else {
			openNav();
		}
	}
	
	function openNav() {
		document.getElementById("mySidebar").style.width = "250px";
		document.getElementById("main").style.marginLeft = "250px";
	}
	
	function closeNav() {
		document.getElementById("mySidebar").style.width = "0";
		document.getElementById("main").style.marginLeft = "0";
	}
	
	
	</script>
</body>
</html>
